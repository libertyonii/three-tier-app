name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/three-tier-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/three-tier-frontend

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target:  production
          push:    ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target:  production
          push:    ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Linux VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          port:     ${{ secrets.VM_PORT }}
          script: |
            set -e

            mkdir -p ~/three-tier-app
            cd ~/three-tier-app

            cat > docker-compose.yml << 'COMPOSEOF'
            version: "3.9"
            services:
              frontend:
                image: ${{ secrets.DOCKER_USERNAME }}/three-tier-frontend:sha-${{ github.sha }}
                container_name: app-frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - frontend-net

              backend:
                image: ${{ secrets.DOCKER_USERNAME }}/three-tier-backend:sha-${{ github.sha }}
                container_name: app-backend
                restart: unless-stopped
                expose:
                  - "5000"
                environment:
                  NODE_ENV: production
                  DB_HOST: db
                  DB_PORT: 5432
                  DB_NAME: appdb
                  DB_USER: appuser
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - frontend-net
                  - backend-net
                healthcheck:
                  test: ["CMD","wget","-qO-","http://localhost:5000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 20s

              db:
                image: postgres:16-alpine
                container_name: app-database
                restart: unless-stopped
                expose:
                  - "5432"
                environment:
                  POSTGRES_DB: appdb
                  POSTGRES_USER: appuser
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                networks:
                  - backend-net
                healthcheck:
                  test: ["CMD-SHELL","pg_isready -U appuser -d appdb"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                  start_period: 15s

            networks:
              frontend-net:
                driver: bridge
              backend-net:
                driver: bridge
                internal: true

            volumes:
              postgres-data:
                driver: local
            COMPOSEOF

            cat > .env << ENVEOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=sha-${{ github.sha }}
            DB_NAME=appdb
            DB_USER=appuser
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ENVEOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed successfully at $(date)"